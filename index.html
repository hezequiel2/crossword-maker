<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crossword Maker for Teachers</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="screen-only">
    <h1>Crossword Maker</h1>
    <p class="tagline">Free, printable crosswords for elementary classrooms.</p>
  </header>

  <main>
    <section class="form screen-only">
      <label class="field">
        <span>Puzzle title</span>
        <input id="title" type="text" placeholder="Spring Vocabulary" />
      </label>

      <label class="field">
        <span>Words and clues (one per line: <code>answer, clue</code> — separator can be a comma, <code>=</code>, or <code>:</code>)</span>
        <textarea id="entries" rows="12" spellcheck="false" placeholder="SUN, It rises in the east each morning&#10;RAIN, Water that falls from clouds&#10;..."></textarea>
      </label>

      <div class="actions">
        <button id="generate" type="button">Generate puzzle</button>
        <button id="regenerate" type="button" disabled>Try another layout</button>
        <button id="print-puzzle" type="button" disabled>Print puzzle</button>
        <button id="print-answers" type="button" disabled>Print answer key</button>
      </div>

      <div id="warning" class="warning" hidden></div>
    </section>

    <section id="output" class="output" aria-live="polite"></section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
